name: 📚 一七小说书源自动维护

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新书源'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  validate-and-update:
    name: 验证 & 更新书源
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout 代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 🔍 运行书源验证
        run: python validate.py
        continue-on-error: true

      - name: 📊 查看验证报告
        run: cat logs/validation_report.md || echo "（报告文件不存在）"

      - name: 📤 提交书源更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/ logs/ || true
          if git diff --staged --quiet; then
            echo "📭 无内容变更，跳过提交"
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M UTC')
            git commit -m "📚 自动更新书源 ${TIMESTAMP}"
            git push
            echo "✅ 已成功推送更新"
          fi

      - name: 🔗 书源订阅链接
        run: |
          REPO="${{ github.repository }}"
          echo "订阅链接：https://raw.githubusercontent.com/${REPO}/main/sources/1qxs.json"
